spring.application.name=glasses-store

# ==========================================
# Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3307/glasses_store?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ==========================================
# Docker Compose Support
# ==========================================
spring.docker.compose.enabled=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=c2VjdXJlU2VjcmV0S2V5Rm9yR2xhc3Nlc1N0b3JlSldUU2lnbmluZ1NlY3JldD0=
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# ==========================================
# Logging
# ==========================================
logging.level.com.e_commerce.glasses_store=DEBUG
logging.level.org.springframework.security=DEBUG
# ==========================================
# Mail Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
